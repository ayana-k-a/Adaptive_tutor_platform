{% extends 'base.html' %}

{% block title %}Give Feedback{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow form-card">
            <div class="card-body p-4">
                <h2 class="mb-4">Give Feedback</h2>

                <p><strong>Tutor:</strong> {{ booking.tutor.username }}</p>
                <p><strong>Subject:</strong> {{ booking.subject }}</p>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Submit Feedback</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
