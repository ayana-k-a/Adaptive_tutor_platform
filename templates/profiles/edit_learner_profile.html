{% extends 'base.html' %}

{% block title %}Edit Learner Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow form-card">
            <div class="card-body p-4">
                <h2 class="mb-4">Complete Learner Profile</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
